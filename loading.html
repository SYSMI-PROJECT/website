<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Logo.png" type="image/png">
    <title>Loading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #1d003d, #211b1b, #00072b, #3b025a);
            background-attachment: fixed;
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            font-family: 'Roboto', sans-serif;
            color: #fff;
        }

        .container {
            text-align: center;
            animation: fadeOut 1s ease-out forwards;
            animation-delay: 4s;
        }

        .logo {
            width: 300px;
            height: 300px;
            background: url('Import/icons/Logo.png') no-repeat center center;
            background-size: contain;
            animation: spin 2s linear infinite, zoomIn 1s ease-in-out;
        }

        .loading-text {
            margin-top: 20px;
            font-size: 1.5em;
            color: #fff;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"></div>
        <div class="loading-text">Chargement en cours...</div>
    </div>
    <script>
        // Attendre la fin de l'animation avant la redirection
        document.querySelector('.container').addEventListener('animationend', function(event) {
            if (event.animationName === 'fadeOut') {
                window.location.href = "menu.php";
            }
        });
    </script>
</body>
</html>
