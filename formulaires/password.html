<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <link rel="icon" type="image/jpg" href="./PNG/SYSMI connect.jpg">
    <link rel="stylesheet" type="text/css" href="../css/login.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="../Import/icons/Logo.png">
    <title>Changer le mot de passe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientAnimation 10s ease infinite;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Roboto', sans-serif;
            color: #fff;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-box {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .user-box {
            position: relative;
            margin-bottom: 30px;
        }

        .user-box input {
            width: calc(100% - 20px);
            padding: 12px 10px;
            border: none;
            border-bottom: 2px solid #ffcc00;
            outline: none;
            font-size: 18px;
            background: transparent;
            color: #fff;
            transition: all 0.3s ease;
        }

        .user-box input:focus {
            border-bottom: 2px solid #ffd700;
        }

        .user-box label {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            color: #aaa;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .user-box input:focus ~ label, .user-box input:valid ~ label {
            top: -20px;
            left: 0;
            font-size: 14px;
            color: #ffd700;
        }

        .toggle-password {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            color: #aaa;
        }

        .toggle-password:hover {
            color: #ffd700;
        }

        button {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: white;
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            transform: translateY(-3px);
        }

        .message {
            text-align: center;
            color: #ffcc00;
            font-family: sans-serif;
            margin-bottom: 60px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <!-- Message -->
    <p class="message">Veuillez entrer votre nouveau mot de passe.</p>
    
    <!-- Formulaire de changement de mot de passe -->
    <form action="../traitements/Formulaires/password.php" method="post">
        <div class="user-box">
            <input type="email" name="email" id="email" required>
            <label>Adresse e-mail</label>
        </div>
        <div class="user-box">
            <input type="password" name="password" id="password" required>
            <label>Mot de passe</label>
            <i class="far fa-eye toggle-password" id="togglePassword"></i>
        </div>
        <div class="user-box">
            <input type="password" name="confirm_password" id="confirm_password" required>
            <label>Confirmez le mot de passe</label>
            <i class="far fa-eye toggle-password" id="toggleConfirmPassword"></i>
        </div>
        <div>
            <button type="submit">Changer le mot de passe</button>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });

    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    const confirmPassword = document.getElementById('confirm_password');

    toggleConfirmPassword.addEventListener('click', function () {
        const type = confirmPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmPassword.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });
});
</script>
</body>
</html>
